spring.application.name=@project.name@
spring.application.version=@project.version@
server.port=8080
spring.main.banner-mode=off
spring.threads.virtual.enabled=true
spring.jackson.default-property-inclusion=non_null
# PostgreSQL database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/osrm_zone_manager}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:osrm}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:osrm}
# Disable Cloud SQL by default
spring.cloud.gcp.sql.enabled=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
# Actuator
management.endpoints.web.exposure.include=health
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
logging.level.it.bluecube.osrmzonemanager=info
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{correlationId:-}] %logger{36} - %msg%n
# App config
osrm.zone-manager.config-dir=/config
osrm.zone-manager.data-dir=/data
osrm.zone-manager.base-pbf=/data/base/italy.osm.pbf
osrm.zone-manager.car-lua=/opt/car.lua
osrm.zone-manager.vroom-express-dir=/vroom-express
osrm.zone-manager.reduce-script=/app/scripts/reduce.py
osrm.zone-manager.osrm-port-start=5000
osrm.zone-manager.vroom-port-start=3000
osrm.zone-manager.osrm-default-radius=50
osrm.zone-manager.osrm-mmap=true
osrm.zone-manager.min-pbf-size=1048576
