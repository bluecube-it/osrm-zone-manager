spring.application.name=osrm-zone-manager
server.port=8080
spring.main.banner-mode=off
spring.threads.virtual.enabled=true
spring.jackson.default-property-inclusion=non_null
# H2 database
spring.datasource.url=jdbc:h2:file:/config/registrydb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false
# Actuator
management.endpoints.web.exposure.include=health
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
logging.level.it.bluecube.osrmzonemanager=info
# App config
osrm.zone-manager.config-dir=/config
osrm.zone-manager.data-dir=/data
osrm.zone-manager.base-pbf=/data/base/italy.osm.pbf
osrm.zone-manager.geofabrik-url=https://download.geofabrik.de/europe/italy-latest.osm.pbf
osrm.zone-manager.car-lua=/opt/car.lua
osrm.zone-manager.vroom-express-dir=/vroom-express
osrm.zone-manager.reduce-script=/app/scripts/reduce.py
osrm.zone-manager.zone-ttl-days=90
osrm.zone-manager.max-active-zones=20
osrm.zone-manager.osrm-port-start=5000
osrm.zone-manager.vroom-port-start=3000
osrm.zone-manager.osrm-default-radius=50
osrm.zone-manager.evictor-interval-minutes=10
osrm.zone-manager.osrm-mmap=true
osrm.zone-manager.min-pbf-size=1
