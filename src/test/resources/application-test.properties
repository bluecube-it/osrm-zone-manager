spring.main.allow-bean-definition-overriding=true
spring.jpa.hibernate.ddl-auto=validate
osrm.zone-manager.data-dir=${java.io.tmpdir}/osrm-test-data
osrm.zone-manager.reduce-script=${java.io.tmpdir}/osrm-test-data/reduce.py
osrm.zone-manager.min-pbf-size=1
osrm.zone-manager.osrm-port-start=5000
osrm.zone-manager.vroom-port-start=3000
logging.level.it.bluecube.osrmzonemanager=debug
logging.level.org.testcontainers=warn
logging.level.org.flywaydb=warn
