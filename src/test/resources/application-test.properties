spring.main.allow-bean-definition-overriding=true
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
osrm.zone-manager.config-dir=${java.io.tmpdir}/osrm-test-config
osrm.zone-manager.data-dir=${java.io.tmpdir}/osrm-test-data

osrm.zone-manager.reduce-script=${java.io.tmpdir}/osrm-test-data/reduce.py
osrm.zone-manager.geofabrik-url=http://localhost:${wiremock.server.port}/test.pbf
osrm.zone-manager.zone-ttl-days=90
osrm.zone-manager.max-active-zones=20
osrm.zone-manager.osrm-port-start=5000
osrm.zone-manager.vroom-port-start=3000
logging.level.it.bluecube.osrmzonemanager=debug
