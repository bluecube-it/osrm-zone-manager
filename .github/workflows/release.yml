name: Release

on:
  release:
    types:
      - created

jobs:
  update-and-move-tag:
    name: Bump POM Version & Move Tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.target_commitish }}
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'liberica'
          java-version: '25'
          cache: maven
      - name: Update POM version
        run: ./mvnw versions:set -DnewVersion=${{ github.event.release.tag_name }}
      - name: Commit changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add pom.xml
          if git diff --cached --quiet; then
            echo "POM already at ${{ github.event.release.tag_name }}, nothing to commit"
          else
            git commit -m "chore: bump version to ${{ github.event.release.tag_name }}"
            git push origin ${{ github.event.release.target_commitish }}
          fi
      - name: Move tag to bump commit
        run: |
          TAG=${{ github.event.release.tag_name }}
          git tag -f -a "$TAG" -m "Release $TAG"
          git push origin -f "$TAG"

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: update-and-move-tag
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker BuildX
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ github.event.release.tag_name }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          provenance: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cleanup:
    name: Cleanup on Failure
    if: failure()
    needs: [ update-and-move-tag, build-and-push ]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.target_commitish }}

      - name: Delete tag and release on failure
        run: |
          TAG=${{ github.event.release.tag_name }}
          git tag -d "$TAG" || true
          git push origin --delete "$TAG" || true

          RELEASE_ID=$(curl \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG | jq '.id')

          if [ "$RELEASE_ID" != "null" ] && [ -n "$RELEASE_ID" ]; then
          curl \
            -X DELETE \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID
          fi
